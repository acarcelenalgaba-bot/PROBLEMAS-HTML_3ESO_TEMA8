<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Problemas de Física - Soluciones Detalladas</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        /* --- ESTILOS GENERALES Y LAYOUT --- */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #2c3e50;
            background-color: #f0f4f8;
            overflow: hidden; 
        }

        .pagina-completa {
            display: flex;
            flex-direction: column;
            height: 100vh; 
        }

        /* --- ZONA SUPERIOR: EL MENÚ --- */
        .zona-menu {
            flex: 0 0 auto; 
            background-color: #ffffff; 
            padding: 15px 3%; 
            border-bottom: 1px solid #d1d8e0;
            z-index: 1000; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        h1 {
            margin: 0 0 15px 0; 
            text-align: center;
            font-size: 26px; 
            color: #34495e;
        }

        .contenedor-menus {
            display: flex;
            flex-wrap: nowrap;       /* No permite saltos de línea */
            gap: 8px; 
            align-items: center;
            width: 100%;           
            overflow-x: auto;        /* Habilita scroll si no caben */
            padding-bottom: 12px;    /* Espacio para la barra de scroll */
            justify-content: flex-start; 
        }

        .menu-desplegable {
            flex: 0 0 auto;
            width: auto; 
            padding: 12px 10px; 
            border-radius: 8px;
            border: 1px solid #ced4da;
            font-size: 15px; 
            font-weight: 600;
            color: #495057;
            background-color: #f8f9fa;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Para que al abrirlo se vea bien en algunos navegadores */
        .menu-desplegable option {
            width: auto;
        }

        .menu-desplegable:hover {
            border-color: #3498db;
            background-color: #ffffff;
        }

        /* Este color se aplicará al menú que contiene el problema que se está leyendo actualmente */
        .menu-desplegable.menu-activo {
            background-color: #3498db;
            color: white;
            border-color: #2980b9;
            box-shadow: 0 0 8px rgba(52, 152, 219, 0.4);
        }

        /* --- ZONA INFERIOR --- */
        .zona-lectura {
            flex: 1 1 auto; 
            overflow-y: auto; 
            padding: 10px 5%; 
            background-color: #f1f3f5; 
        }

        #caja-visor {
            background: #ffffff;
            padding: 50px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 6px solid #3498db; 
            min-height: 80%; 
        }

        #mensaje-inicial {
            text-align: center;
            color: #95a5a6;
            font-size: 20px; 
            margin-top: 50px;
        }

        .contenedor-flex {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap; /* Para que se adapte en móviles */
        }
        .columna-texto {
            flex: 1;
            min-width: 300px;
        }
        .columna-imagen {
            flex: 1;
            display: flex;
            justify-content: center;
        }
        .columna-imagen img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
        }



        #contenido-problema { display: none; }
        #titulo-visor { color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-top: 0; }
        #texto-visor { font-size: 20px; line-height: 1.8; margin-top: 25px; } 
        
        .controles-solucion { display: flex; justify-content: center; margin-top: 40px; }
        #btn-solucion { display: none; padding: 15px 35px; background-color: #27ae60; color: white; border: none; border-radius: 6px; font-size: 18px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        #btn-solucion:hover { filter: brightness(1.1); }
        
        #caja-solucion { display: none; margin-top: 35px; padding: 30px; background-color: #fdfdfd; border: 1px solid #e9ecef; border-left: 6px solid #27ae60; color: #2c3e50; font-size: 19px; line-height: 1.8; }
        .resultado { background-color: #FCC0B3; padding: 5px 10px; border-radius: 5px; font-weight: bold; }

        #caja-solucion .paso {
            display: none; 
            margin-bottom: 15px;
            padding: 15px;
            background-color: #f8f9fa;
            border-left: 4px solid #3498db;
            animation: aparecer 0.4s ease-out;
        }

        #caja-solucion .paso.visible {
            display: block; 
        }

        @keyframes aparecer {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="pagina-completa">
        <header class="zona-menu">
            <h1>👨‍🏫 Cuaderno de Física - 3º ESO - Tema 8: Movimiento</h1>
            <div class="contenedor-menus">
                <select class="menu-desplegable" id="menu-ficha1"><option value="" disabled selected>📁 1. Ficha 1 </option></select>
                <select class="menu-desplegable" id="menu-ficha2"><option value="" disabled selected>📁 2. Ficha 2</option></select>
                <select class="menu-desplegable" id="menu-ficha3"><option value="" disabled selected>📁 3. Ficha 3</option></select>
            </div>
        </header>

        <main class="zona-lectura">
            <div id="caja-visor">
                <div id="mensaje-inicial"><p>Selecciona un tema arriba para visualizar los problemas.</p></div>
                <div id="contenido-problema">
                    <h2 id="titulo-visor"></h2>
                    <div id="texto-visor"></div>
                    <div class="controles-solucion">
                        <button id="btn-solucion" onclick="toggleSolucion()">Ver Solución</button>
                        <button id="btn-siguiente-paso" onclick="revelarSiguientePaso()" style="display: none; padding: 15px 35px; background-color: #3498db; color: white; border: none; border-radius: 6px; font-size: 18px; cursor: pointer; font-weight: bold; transition: 0.2s; margin-left: 15px;">Siguiente Paso ⬇️</button>
                    </div>
                    <div id="caja-solucion"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="datos.js"></script>

    <script>

        function ajustarAnchoSoloTitulo(select) {
            // Siempre medimos el texto de la primera opción (el título del menú)
            const textoTitulo = select.options[0].text;
            
            const font = window.getComputedStyle(select).font;
            const canvas = document.createElement("canvas");
            const context = canvas.getContext("2d");
            context.font = font;
            const width = context.measureText(textoTitulo).width;
            
            // Asignamos el ancho fijo del título + espacio para la flecha
            select.style.width = (width + 45) + "px";
        }

        function inicializarMenus() {
            if (typeof baseDatosProblemas === 'undefined') return;

            const todosLosMenus = document.querySelectorAll('.menu-desplegable');

            for (const categoria in baseDatosProblemas) {
                const selectMenu = document.getElementById(`menu-${categoria}`);
                if (selectMenu) {
                    // Rellenar las opciones desde datos.js
                    baseDatosProblemas[categoria].forEach((prob, index) => {
                        const opcion = document.createElement('option');
                        opcion.value = index; 
                        opcion.text = prob.titulo; 
                        selectMenu.appendChild(opcion);
                    });

                    // Ajustar ancho al título inicial
                    ajustarAnchoSoloTitulo(selectMenu);

                    selectMenu.addEventListener('change', function() {
                        if (this.value !== "") {
                            // 1. Obtenemos los datos del problema antes de resetear el menú
                            const prob = baseDatosProblemas[categoria][this.value];
                            
                            // 2. Pintamos el problema en el visor central
                            mostrarEnunciado(prob.titulo, prob.enunciado, prob.solucion);
                            
                            // 3. AQUÍ EVITAMOS EL CAMBIO DE NOMBRE:
                            // Forzamos al menú a que vuelva a mostrar el índice 0 (el título)
                            this.selectedIndex = 0; 

                            // 4. Mantenemos el color para saber cuál está "activo"
                            todosLosMenus.forEach(m => m.classList.remove('menu-activo'));
                            this.classList.add('menu-activo');
                        }
                    });
                    
                }
            }
        }

        function mostrarEnunciado(titulo, texto, solucionHTML) {
            document.getElementById('mensaje-inicial').style.display = 'none';
            document.getElementById('contenido-problema').style.display = 'block';
            document.getElementById('caja-solucion').style.display = 'none';
            
            const btnSiguiente = document.getElementById('btn-siguiente-paso');
            if(btnSiguiente) btnSiguiente.style.display = 'none';

            document.getElementById('titulo-visor').innerText = titulo;
            document.getElementById('texto-visor').innerHTML = texto;
            
            const btn = document.getElementById('btn-solucion');
            if (solucionHTML) {
                document.getElementById('caja-solucion').innerHTML = solucionHTML;
                btn.style.display = 'inline-block';
                btn.innerText = 'Ver Solución';
            } else {
                btn.style.display = 'none';
            }
            
            MathJax.typesetPromise();
            document.querySelector('.zona-lectura').scrollTop = 0;
        }

        function toggleSolucion() {
            const caja = document.getElementById('caja-solucion');
            const btn = document.getElementById('btn-solucion');
            const btnSiguiente = document.getElementById('btn-siguiente-paso');

            if (caja.style.display === 'none') {
                caja.style.display = 'block';
                btn.innerText = 'Ocultar Solución';
                btnSiguiente.style.display = 'inline-block';
                btnSiguiente.innerText = "Mostrar primer paso ⬇️";
                btnSiguiente.disabled = false;
                btnSiguiente.style.backgroundColor = "#3498db";
                btnSiguiente.style.cursor = "pointer";
                document.querySelectorAll('#caja-solucion .paso').forEach(p => p.classList.remove('visible'));
                MathJax.typesetPromise();
            } else {
                caja.style.display = 'none';
                btn.innerText = 'Ver Solución';
                btnSiguiente.style.display = 'none';
            }
        }

        function revelarSiguientePaso() {
            const contenedor = document.getElementById('caja-solucion');
            const boton = document.getElementById('btn-siguiente-paso');
            const siguientePaso = contenedor.querySelector('.paso:not(.visible)');
            if (siguientePaso) {
                siguientePaso.classList.add('visible'); 
                boton.innerText = "Siguiente paso ⬇️";
                const pasosRestantes = contenedor.querySelector('.paso:not(.visible)');
                if (!pasosRestantes) {
                    boton.innerText = "¡Solución completada!";
                    boton.disabled = true;
                    boton.style.backgroundColor = "#95a5a6";
                    boton.style.cursor = "default";
                }
            }
        }

        window.onload = inicializarMenus;
    </script>
</body>
</html>
